server {
    listen 80;
    server_name financeiro.lidera.app.br;

    location ^~ /.well-known/acme-challenge/ {
        root "D:/LIDERA/SIAFI/nginx";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name financeiro.lidera.app.br;

    ssl_certificate     "D:/LIDERA/SIAFI/nginx/ssl/financeiro.lidera.app.br-chain.pem";
    ssl_certificate_key "D:/LIDERA/SIAFI/nginx/ssl/financeiro.lidera.app.br-key.pem";

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/x-javascript text/xml
               application/xml image/svg+xml;

    # ── Webhook Mercado Pago (URL pública sem prefixo /api) ──────────────────
    location = /webhook/mercadopago {
        proxy_pass         http://127.0.0.1:4010/api/webhooks/mercadopago;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── API Backend (NestJS :4010) ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4010;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_header  Set-Cookie;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Arquivos de clientes (uploads) ────────────────────────────────────────
    location /uploads/ {
        alias   "D:/LIDERA/SIAFI/backend/uploads/";
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Assets estáticos Next.js (cache agressivo) ────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:4011;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Frontend Next.js (:4011) ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4011;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # Supabase Auth sets large JWT cookies — buffers need to be big enough
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Bloqueia requisições HMR de dev que não existem em produção ───────────
    location /_next/webpack-hmr {
        return 404;
    }
}
